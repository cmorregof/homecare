services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: homecare_ccv
      POSTGRES_USER: homecare
      POSTGRES_PASSWORD: homecare
    ports:
      - "54322:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schemas.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  pgdata:
